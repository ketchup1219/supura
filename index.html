<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Ink Shooter - Dynamic 8-Player Battle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Arial Black', sans-serif; user-select: none; touch-action: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; border: 3px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; mix-blend-mode: difference; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; pointer-events: none; z-index: 100; }
        #timer { font-size: 32px; font-weight: bold; color: #ffff00; }
        #inkBar { width: 220px; height: 18px; background: #333; border: 2px solid white; margin-top:5px; position: relative; }
        #inkFill { width: 100%; height: 100%; background: #FD2996; transition: width 0.1s; }
        #turfStats { position: absolute; bottom: 210px; left: 20px; display: flex; gap: 15px; font-size: 20px; color: white; text-shadow: 2px 2px 4px #000; z-index: 100; }
        .stat-pink { color: #FD2996; font-weight: bold; }
        .stat-green { color: #3D9140; font-weight: bold; }
        #mapContainer { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(0,0,0,0.7); border: 3px solid #555; border-radius: 10px; overflow: hidden; z-index: 100; }
        #miniMap { width: 100%; height: 100%; }
        #ratioBar { position: absolute; bottom: 20px; left: 150px; width: 20px; height: 120px; background: #3D9140; border: 2px solid white; display: flex; flex-direction: column-reverse; overflow: hidden; z-index: 100; }
        #pinkRatioFill { width: 100%; background: #FD2996; transition: height 0.3s; }
        #startOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; background: rgba(0,0,0,0.8); z-index: 1000; cursor: pointer; text-align: center; }
        #finishText { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #fff; font-size: 80px; text-shadow: 0 0 30px #000; z-index: 1100; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; }
        #resultScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1200; color: white; }
        #mobileControls { position: absolute; bottom: 20px; right: 20px; display: none; gap: 20px; z-index: 500; }
        .m-btn { width: 85px; height: 85px; background: rgba(255,255,255,0.2); border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; touch-action: none; }
        #joyLeft { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 500; border: 2px solid rgba(255,255,255,0.3); }
        #joyStick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: white; border-radius: 50%; opacity: 0.5; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="startOverlay">
        <div style="font-size: 60px; margin-bottom: 20px;">3D INK SHOOTER</div>
        <div id="playerCount">WAITING FOR PLAYERS...</div>
        <div style="font-size: 20px; margin-top: 30px; color: #aaa;">TAP TO JOIN BATTLE</div>
    </div>
    <div id="finishText">FINISH!</div>

    <div id="ui">
        <div id="timer">READY</div>
        <div id="inkBar"><div id="inkFill"></div></div>
    </div>

    <div id="turfStats">
        <span class="stat-pink">PINK: <span id="livePink">50</span>%</span>
        <span class="stat-green">COBALT: <span id="liveGreen">50</span>%</span>
    </div>

    <div id="mapContainer"><canvas id="miniMap" width="180" height="180"></canvas></div>
    <div id="ratioBar"><div id="pinkRatioFill" style="height: 50%;"></div></div>

    <div id="joyLeft"><div id="joyStick"></div></div>
    <div id="mobileControls">
        <div class="m-btn" id="btnDive">DIVE</div>
        <div class="m-btn" id="btnShoot">SHOOT</div>
    </div>

    <div id="resultScreen">
        <h1 id="winTeamText" style="font-size:40px; margin:0;"></h1>
        <div style="font-size:24px; margin:20px;">
            <span style="color:#FD2996">PINK: <span id="finalPink">0</span>%</span> / 
            <span style="color:#3D9140">COBALT: <span id="finalGreen">0</span>%</span>
        </div>
        <button onclick="resetGameServer()" style="padding:15px 30px; font-size:20px; cursor:pointer; border-radius:50px; border:none; background:#fff; font-weight:bold;">NEXT MATCH</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyC74b-33rjqnysLOgVEbtAKsrqJSfaWZEE",
          authDomain: "supura-8f064.firebaseapp.com",
          databaseURL: "https://supura-8f064-default-rtdb.firebaseio.com/",
          projectId: "supura-8f064",
          storageBucket: "supura-8f064.firebasestorage.app",
          messagingSenderId: "419833510947",
          appId: "1:419833510947:web:4c3d898a648dba026ec596"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myId = "player_" + Math.random().toString(36).substring(2, 7);
        const playersRef = ref(db, 'players/' + myId);
        const allPlayersRef = ref(db, 'players');
        const inkRef = ref(db, 'ink');
        const gameStateRef = ref(db, 'gameState');

        const TEAM_PINK = 0xFD2996;
        const TEAM_GREEN = 0x3D9140;
        const MAP_SIZE = 300;
        const GAME_DURATION = 60000;
        
        let gameActive = false, gameOver = false;
        let isShooting = false, isMobileDive = false;
        let yaw = 0, pitch = 0.3, inkHeightOffset = 0.12;
        let serverEndTime = null;
        const keys = {};
        const isTouch = 'ontouchstart' in window;
        const touchState = { moveID: null, move: {x:0, y:0}, lookID: null, lastLookX: 0, lastLookY: 0 };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        const floor = new THREE.Mesh(new THREE.BoxGeometry(MAP_SIZE, 1, MAP_SIZE), new THREE.MeshPhongMaterial({ color: 0x111111 }));
        floor.position.y = -0.5;
        scene.add(floor);

        const colliders = [];
        function addObstacle(w, h, d, x, y, z) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({ color: 0x222222 }));
            m.position.set(x, y, z); scene.add(m);
            colliders.push(new THREE.Box3().setFromObject(m));
        }
        addObstacle(MAP_SIZE, 15, 5, 0, 7.5, 150); addObstacle(MAP_SIZE, 15, 5, 0, 7.5, -150);
        addObstacle(5, 15, MAP_SIZE, 150, 7.5, 0); addObstacle(5, 15, MAP_SIZE, -150, 7.5, 0);
        addObstacle(60, 8, 60, 0, 4, 0);

        let agents = [], bullets = [], splats = [];
        let otherPlayers = {};
        let cpus = [];

        function createAgent(team, isPlayer, x, z, isCPU = false, id = null) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.5, 2.5), new THREE.MeshPhongMaterial({ color: team }));
            group.add(body); group.position.set(x, 1.75, z);
            scene.add(group);
            const agent = { id, group, team, isPlayer, isCPU, hp: 100, ink: 100, isDead: false, cpuDir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(), cpuTimer: 0, spawnPos: {x, z} };
            agents.push(agent);
            return agent;
        }

        // 自分の生成
        const myTeam = TEAM_PINK; // 簡易化のため自分は常にピンク
        const player = createAgent(myTeam, true, -100, 100, false, myId);

        // --- 8人スロット同期ロジック ---
        onValue(allPlayersRef, (snapshot) => {
            const data = snapshot.val() || {};
            const humanCount = Object.keys(data).length;
            document.getElementById('playerCount').innerText = `PLAYERS: ${humanCount} / 8`;

            // 他プレイヤーの表示更新
            for (let id in data) {
                if (id === myId) continue;
                const p = data[id];
                if (!otherPlayers[id]) {
                    otherPlayers[id] = createAgent(p.team, false, p.x, p.z, false, id);
                } else {
                    otherPlayers[id].group.position.lerp(new THREE.Vector3(p.x, p.isStealth ? 0.5 : 1.75, p.z), 0.2);
                    otherPlayers[id].group.rotation.y = p.ry;
                    otherPlayers[id].group.scale.y = p.isStealth ? 0.2 : 1.0;
                }
            }
            // 退出したプレイヤーの削除
            for (let id in otherPlayers) {
                if (!data[id]) {
                    scene.remove(otherPlayers[id].group);
                    agents = agents.filter(a => a.id !== id);
                    delete otherPlayers[id];
                }
            }

            // CPUの動的調整 (8 - 人間の数)
            const targetCpuCount = 8 - humanCount;
            adjustCPUs(targetCpuCount);
        });

        function adjustCPUs(count) {
            // 現在のCPUを一旦消去して再配置（または増減）
            cpus.forEach(c => { scene.remove(c.group); agents = agents.filter(a => a !== c); });
            cpus = [];
            for (let i = 0; i < count; i++) {
                // 半分は味方(ピンク)、半分は敵(グリーン)
                const team = (i % 2 === 0) ? TEAM_GREEN : TEAM_PINK;
                const x = team === TEAM_PINK ? -80 - (i*10) : 80 + (i*10);
                const z = team === TEAM_PINK ? 80 : -80;
                const cpu = createAgent(team, false, x, z, true);
                cpus.push(cpu);
            }
        }

        onValue(gameStateRef, (snapshot) => {
            const data = snapshot.val();
            if (data) { serverEndTime = data.endTime; gameActive = true; document.getElementById('startOverlay').style.display = 'none'; }
        });

        onChildAdded(inkRef, (snapshot) => {
            const data = snapshot.val();
            localCreateSplat(data.x, data.z, data.team, false);
        });

        function localCreateSplat(x, z, team, shouldSync) {
            inkHeightOffset += 0.0002;
            const s = new THREE.Mesh(new THREE.CircleGeometry(7, 8), new THREE.MeshBasicMaterial({ color: team, side: THREE.DoubleSide }));
            s.position.set(x, Math.min(0.5, inkHeightOffset), z); s.rotation.x = -Math.PI / 2;
            scene.add(s); splats.push({ x, z, team, mesh: s });
            if (splats.length > 1000) { const old = splats.shift(); scene.remove(old.mesh); }
            if (shouldSync) push(inkRef, { x, z, team });
        }

        // 入力系
        document.getElementById('startOverlay').onclick = () => {
            if(!isTouch) renderer.domElement.requestPointerLock();
            if(!gameActive) set(gameStateRef, { endTime: Date.now() + GAME_DURATION });
        };

        // ... (以下、タッチ・移動・カメラ・描画ロジックは前回と同様の最適化版を維持) ...
        const stick = document.getElementById('joyStick');
        window.addEventListener('touchstart', e => { Array.from(e.changedTouches).forEach(t => { if(t.clientX < window.innerWidth / 2) touchState.moveID = t.identifier; else { touchState.lookID = t.identifier; touchState.lastLookX = t.clientX; touchState.lastLookY = t.clientY; } }); }, { passive: false });
        window.addEventListener('touchmove', e => { Array.from(e.changedTouches).forEach(t => { if(t.identifier === touchState.moveID) { const rect = document.getElementById('joyLeft').getBoundingClientRect(); const dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60); const dist = Math.min(50, Math.hypot(dx, dy)); const angle = Math.atan2(dy, dx); touchState.move.x = (Math.cos(angle) * dist) / 50; touchState.move.y = (Math.sin(angle) * dist) / 50; stick.style.transform = `translate(${touchState.move.x*50}px, ${touchState.move.y*50}px)`; } else if(t.identifier === touchState.lookID) { yaw -= (t.clientX - touchState.lastLookX) * 0.005; pitch = Math.max(-0.6, Math.min(0.8, pitch - (t.clientY - touchState.lastLookY) * 0.005)); touchState.lastLookX = t.clientX; touchState.lastLookY = t.clientY; } }); }, { passive: false });
        window.addEventListener('touchend', e => { Array.from(e.changedTouches).forEach(t => { if(t.identifier === touchState.moveID) { touchState.move = {x:0, y:0}; stick.style.transform = `translate(0,0)`; } }); });
        document.getElementById('btnShoot').ontouchstart = () => isShooting = true;
        document.getElementById('btnShoot').ontouchend = () => isShooting = false;
        document.getElementById('btnDive').ontouchstart = () => isMobileDive = true;
        document.getElementById('btnDive').ontouchend = () => isMobileDive = false;
        document.addEventListener('mousemove', (e) => { if (document.pointerLockElement === renderer.domElement) { yaw -= e.movementX * 0.0025; pitch = Math.max(-0.6, Math.min(0.8, pitch - e.movementY * 0.0025)); } });
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        window.onmousedown = () => { if(gameActive) isShooting = true; };
        window.onmouseup = () => isShooting = false;

        const mapCanvas = document.getElementById('miniMap'), mapCtx = mapCanvas.getContext('2d');

        function update() {
            requestAnimationFrame(update);
            if (gameActive && !gameOver && serverEndTime) {
                const now = Date.now();
                const remaining = Math.max(0, Math.floor((serverEndTime - now) / 1000));
                document.getElementById('timer').innerText = `00:${remaining.toString().padStart(2, '0')}`;
                if (remaining <= 0) { finishGame(); return; }

                bullets.forEach((b, i) => {
                    b.mesh.position.addScaledVector(b.dir, 2.0);
                    agents.forEach(a => {
                        if(!a.isDead && a.team !== b.team && b.mesh.position.distanceTo(a.group.position) < 3) {
                            a.isDead = true; a.group.visible = false;
                            setTimeout(() => { a.isDead = false; a.group.visible = true; a.group.position.set(a.spawnPos.x, 1.75, a.spawnPos.z); }, 4000);
                            b.life = 0;
                        }
                    });
                    if (--b.life <= 0 || b.mesh.position.y <= 0) {
                        localCreateSplat(b.mesh.position.x, b.mesh.position.z, b.team, true);
                        scene.remove(b.mesh); bullets.splice(i, 1);
                    }
                });

                agents.forEach(a => {
                    if(a.isDead || !a.isPlayer && !a.isCPU) return; // 他プレイヤーの移動はonValueで処理

                    let onInk = null;
                    for (let i = splats.length - 1; i >= Math.max(0, splats.length - 30); i--) {
                        if (Math.hypot(splats[i].x - a.group.position.x, splats[i].z - a.group.position.z) < 8) { onInk = splats[i].team; break; }
                    }

                    if(a.isPlayer) {
                        player.isStealth = !isShooting && (keys['ShiftLeft'] || isMobileDive) && onInk === player.team;
                        player.group.scale.y = player.isStealth ? 0.2 : 1.0;
                        player.group.position.y = player.isStealth ? 0.5 : 1.75;
                        player.ink = player.isStealth ? Math.min(100, player.ink + 1.2) : Math.min(100, player.ink + 0.1);
                        let speed = (onInk && onInk !== player.team) ? 0.1 : (player.isStealth ? 1.1 : 0.55);
                        const oldPos = player.group.position.clone();
                        const mv = new THREE.Vector3();
                        if (isTouch) { mv.x = touchState.move.x; mv.z = touchState.move.y; }
                        else { if (keys['KeyW']) mv.z -= 1; if (keys['KeyS']) mv.z += 1; if (keys['KeyA']) mv.x -= 1; if (keys['KeyD']) mv.x += 1; }
                        if (mv.length() > 0) player.group.translateOnAxis(mv.normalize(), speed); 
                        player.group.rotation.y = yaw;
                        if (isShooting && player.ink > 2) {
                            player.ink -= 0.6;
                            if (Math.random() > 0.5) {
                                const b = new THREE.Mesh(new THREE.SphereGeometry(0.7), new THREE.MeshBasicMaterial({ color: player.team }));
                                b.position.copy(player.group.position).y += 1; scene.add(b);
                                const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
                                bullets.push({ mesh: b, dir, life: 60, team: player.team });
                            }
                        }
                        set(playersRef, { x: player.group.position.x, z: player.group.position.z, ry: yaw, team: player.team, isStealth: player.isStealth });
                    } else if(a.isCPU) {
                        a.cpuTimer--;
                        if(a.cpuTimer <= 0) { a.cpuTimer = 60 + Math.random() * 100; a.cpuDir.set(Math.random()-0.5, 0, Math.random()-0.5).normalize(); }
                        a.group.position.addScaledVector(a.cpuDir, 0.35);
                        a.group.rotation.y = Math.atan2(a.cpuDir.x, a.cpuDir.z);
                        if(Math.random() > 0.97) {
                            const b = new THREE.Mesh(new THREE.SphereGeometry(0.7), new THREE.MeshBasicMaterial({ color: a.team }));
                            b.position.copy(a.group.position).y += 1; scene.add(b);
                            bullets.push({ mesh: b, dir: a.cpuDir.clone(), life: 50, team: a.team });
                        }
                    }
                });
            }

            const dist = 18;
            camera.position.set(player.group.position.x + dist * Math.sin(yaw) * Math.cos(pitch), player.group.position.y + 8 + dist * Math.sin(pitch), player.group.position.z + dist * Math.cos(yaw) * Math.cos(pitch));
            camera.lookAt(player.group.position.x, player.group.position.y + 1, player.group.position.z);

            mapCtx.fillStyle = '#111'; mapCtx.fillRect(0, 0, 180, 180);
            let pCount = 0;
            splats.forEach(s => {
                mapCtx.fillStyle = s.team === TEAM_PINK ? '#FD2996' : '#3D9140';
                mapCtx.fillRect((s.x/MAP_SIZE+0.5)*180, (s.z/MAP_SIZE+0.5)*180, 3, 3);
                if (s.team === TEAM_PINK) pCount++;
            });
            const pRatio = Math.floor((pCount / (splats.length || 1)) * 100);
            document.getElementById('livePink').innerText = pRatio;
            document.getElementById('liveGreen').innerText = 100 - pRatio;
            document.getElementById('pinkRatioFill').style.height = pRatio + '%';

            renderer.render(scene, camera);
        }

        function finishGame() {
            gameOver = true;
            document.getElementById('finishText').style.transform = 'translate(-50%, -50%) scale(1)';
            setTimeout(() => { document.getElementById('resultScreen').style.display = 'flex'; }, 3000);
        }

        window.resetGameServer = () => {
            remove(inkRef);
            set(gameStateRef, { endTime: Date.now() + GAME_DURATION });
            location.reload();
        };

        window.onbeforeunload = () => remove(playersRef);
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        update();
    </script>
</body>
</html>
